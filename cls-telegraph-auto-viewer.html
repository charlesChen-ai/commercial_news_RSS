<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多源财经快讯自动盯盘台</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --panel: #f7f7fb;
      --panel-strong: #ffffff;
      --text: #1c1c1e;
      --muted: #6e6e73;
      --line: rgba(17, 17, 17, 0.1);
      --brand: #0a84ff;
      --brand-soft: rgba(10, 132, 255, 0.12);
      --green: #34c759;
      --red: #b45309;
      --amber: #ff9500;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.07), 0 8px 20px rgba(0, 0, 0, 0.04);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      padding: 12px;
    }

    .app {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(560px, 1fr);
      gap: 12px;
      transition: grid-template-columns .22s ease;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 1fr;
      gap: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .left {
      padding: 14px;
      position: sticky;
      top: 12px;
      height: calc(100vh - 24px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: opacity .2s ease, transform .22s ease, padding .2s ease, border-color .2s ease;
    }

    .app.sidebar-collapsed .left {
      opacity: 0;
      transform: translateX(-14px);
      pointer-events: none;
      height: 0;
      padding: 0;
      overflow: hidden;
      border-color: transparent;
      box-shadow: none;
    }

    .title {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .left-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .btn-ghost {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
      background: var(--panel-strong);
      border: 1px solid rgba(17, 17, 17, 0.12);
      color: var(--brand);
      white-space: nowrap;
    }

    .btn-ghost:hover {
      border-color: rgba(10, 132, 255, 0.4);
    }

    .desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: var(--panel-strong);
      font-size: 12px;
      color: var(--muted);
    }

    .stat b {
      display: block;
      color: var(--brand);
      font-size: 17px;
      margin-top: 2px;
      line-height: 1;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
    }

    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-strong);
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
    }

    button {
      cursor: pointer;
      transition: all .16s ease;
    }

    button:hover {
      border-color: rgba(10, 132, 255, 0.4);
    }

    button.active {
      background: var(--brand-soft);
      color: var(--brand);
      border-color: rgba(10, 132, 255, 0.38);
    }

    button.warn {
      color: #9a3412;
      border-color: #fdba74;
    }

    .status {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-strong);
      padding: 9px 10px;
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      margin-right: 6px;
      background: #9ca3af;
    }

    .dot.ok { background: var(--green); }
    .dot.err { background: var(--red); }
    .dot.run { background: var(--amber); }

    .tips {
      margin-top: auto;
      border-radius: 12px;
      border: 1px solid rgba(17, 17, 17, 0.08);
      background: var(--panel-strong);
      padding: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .right {
      min-height: calc(100vh - 24px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.82);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .head h2 {
      margin: 0;
      font-size: 16px;
    }

    .badge {
      font-size: 12px;
      color: var(--brand);
      background: rgba(10, 132, 255, 0.12);
      border: 1px solid rgba(10, 132, 255, 0.24);
      border-radius: 999px;
      padding: 2px 9px;
      white-space: nowrap;
    }

    .feed-section-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
    }

    .section-pill {
      width: auto;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(17, 17, 17, 0.12);
      background: var(--panel-strong);
      color: #3f3f46;
    }

    .section-pill.active {
      background: rgba(10, 132, 255, 0.14);
      border-color: rgba(10, 132, 255, 0.34);
      color: var(--brand);
    }

    .feed {
      flex: 1;
      overflow: auto;
      padding: 12px;
      scroll-behavior: smooth;
      contain: paint;
      transform: translateZ(0);
    }

    .item {
      position: relative;
      border: 1.2px solid rgba(17, 17, 17, 0.12);
      background: var(--panel-strong);
      border-radius: 14px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.06);
      padding: 10px 12px;
      margin-bottom: 14px;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 9px;
      bottom: 9px;
      width: 3.5px;
      border-radius: 2px;
      display: none;
    }

    .item.item-enter {
      animation: item-insert .28s ease-out both;
      will-change: transform, opacity;
    }

    @keyframes item-insert {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .item.level-a {
      border-color: rgba(13, 148, 136, 0.28);
    }

    .item.level-b {
      border-color: rgba(255, 149, 0, 0.24);
    }

    .item.level-a::before {
      display: block;
      background: rgba(13, 148, 136, 0.86);
    }

    .item.level-b::before {
      display: block;
      background: rgba(255, 149, 0, 0.82);
    }

    .item:last-child { margin-bottom: 0; }

    .item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .item-time {
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1px;
      color: var(--text);
      white-space: nowrap;
      line-height: 1;
    }

    .item-tags {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    .source-badge {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 1px 8px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .source-cls {
      color: #0f766e;
      background: rgba(15, 118, 110, 0.12);
      border-color: rgba(15, 118, 110, 0.24);
    }

    .source-eastmoney {
      color: #a16207;
      background: rgba(202, 138, 4, 0.12);
      border-color: rgba(202, 138, 4, 0.24);
    }

    .source-sina {
      color: #7e22ce;
      background: rgba(126, 34, 206, 0.11);
      border-color: rgba(126, 34, 206, 0.24);
    }

    .source-wscn {
      color: #475569;
      background: rgba(71, 85, 105, 0.11);
      border-color: rgba(71, 85, 105, 0.22);
    }

    .source-ths {
      color: #7e22ce;
      background: rgba(126, 34, 206, 0.11);
      border-color: rgba(126, 34, 206, 0.24);
    }

    .source-other {
      color: #475569;
      background: rgba(71, 85, 105, 0.11);
      border-color: rgba(71, 85, 105, 0.22);
    }

    .lv {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 1px 8px;
      font-weight: 700;
    }

    .lv.lv-a {
      color: #0f766e;
      background: rgba(13, 148, 136, 0.12);
      border-color: rgba(13, 148, 136, 0.24);
    }

    .lv.lv-b {
      color: #b16800;
      background: rgba(255, 149, 0, 0.12);
      border-color: rgba(255, 149, 0, 0.24);
    }

    .lv.lv-c {
      color: #3666d6;
      background: rgba(54, 102, 214, 0.1);
      border-color: rgba(54, 102, 214, 0.2);
    }

    .lv.lv-n {
      color: #334155;
      background: rgba(100, 116, 139, 0.12);
      border-color: rgba(100, 116, 139, 0.22);
    }

    .title-row {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 5px;
    }

    .text {
      font-size: 14px;
      line-height: 1.62;
      white-space: pre-wrap;
      word-break: break-word;
      color: #4a4a50;
    }

    .expand-wrap {
      margin-top: 2px;
    }

    .expand-wrap summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #475569;
      background: rgba(71, 85, 105, 0.08);
      border: 1px solid rgba(71, 85, 105, 0.2);
      border-radius: 999px;
      padding: 2px 9px;
      margin-bottom: 8px;
    }

    .expand-wrap summary::-webkit-details-marker {
      display: none;
    }

    .expand-wrap summary::before {
      content: '▸';
      font-size: 12px;
      line-height: 1;
      transition: transform .16s ease;
    }

    .expand-wrap[open] summary::before {
      transform: rotate(90deg);
    }

    .expand-wrap[open] summary {
      margin-bottom: 6px;
      background: rgba(71, 85, 105, 0.12);
      border-color: rgba(71, 85, 105, 0.26);
    }

    .meta {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta-row {
      margin-top: 8px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
    }

    .meta-row .meta {
      margin-top: 0;
      flex: 1;
      min-width: 0;
    }

    .cluster-meta {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #4b5563;
      background: rgba(17, 17, 17, 0.05);
      border: 1px solid rgba(17, 17, 17, 0.1);
      border-radius: 999px;
      padding: 2px 9px;
      white-space: nowrap;
      max-width: 100%;
    }

    .cluster-wrap {
      margin-top: 7px;
    }

    .cluster-wrap summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #6d28d9;
      background: rgba(109, 40, 217, 0.08);
      border: 1px solid rgba(109, 40, 217, 0.22);
      border-radius: 999px;
      padding: 2px 9px;
    }

    .cluster-wrap summary::-webkit-details-marker {
      display: none;
    }

    .cluster-wrap summary::before {
      content: '▸';
      font-size: 12px;
      line-height: 1;
      transition: transform .16s ease;
    }

    .cluster-wrap[open] summary::before {
      transform: rotate(90deg);
    }

    .cluster-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cluster-row {
      border-radius: 10px;
      border: 1px solid rgba(17, 17, 17, 0.08);
      background: rgba(17, 17, 17, 0.03);
      padding: 6px 8px;
      font-size: 12px;
      color: #4b5563;
    }

    .cluster-row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
      color: #6b7280;
      font-size: 11px;
    }

    .cluster-row-time {
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      color: #4b5563;
      white-space: nowrap;
    }

    .cluster-row-source {
      border-radius: 999px;
      padding: 1px 7px;
      border: 1px solid rgba(109, 40, 217, 0.22);
      background: rgba(109, 40, 217, 0.08);
      color: #6d28d9;
      white-space: nowrap;
    }

    .cluster-row-text {
      color: #4b5563;
      line-height: 1.5;
      word-break: break-word;
    }

    .ai-btn {
      width: auto;
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 12px;
      line-height: 1;
      color: var(--brand);
      background: rgba(10, 132, 255, 0.14);
      border: 1px solid rgba(10, 132, 255, 0.26);
      white-space: nowrap;
    }

    .ai-btn:hover {
      border-color: rgba(10, 132, 255, 0.42);
    }

    .ai-btn.loading {
      color: #b16800;
      border-color: rgba(255, 149, 0, 0.32);
      background: rgba(255, 149, 0, 0.14);
      cursor: wait;
    }

    .ai-btn.done {
      color: var(--brand);
      border-color: rgba(10, 132, 255, 0.32);
      background: rgba(10, 132, 255, 0.18);
    }

    .ai-panel {
      margin-top: 7px;
      border-radius: 10px;
      border: 1px solid rgba(17, 17, 17, 0.08);
      background: #ffffff;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.55;
    }

    .ai-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .ai-chip {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 1px 7px;
      font-weight: 700;
      font-size: 11px;
      white-space: nowrap;
    }

    .ai-chip.bullish {
      color: #1a8f45;
      background: rgba(52, 199, 89, 0.14);
      border-color: rgba(52, 199, 89, 0.28);
    }

    .ai-chip.bearish {
      color: #475569;
      background: rgba(71, 85, 105, 0.14);
      border-color: rgba(71, 85, 105, 0.28);
    }

    .ai-chip.neutral {
      color: #b16800;
      background: rgba(255, 149, 0, 0.14);
      border-color: rgba(255, 149, 0, 0.28);
    }

    .ai-score {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .ai-summary {
      color: #2f2f33;
      margin: 4px 0 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ai-bullets {
      margin: 5px 0 0;
      padding-left: 16px;
      color: #5f5f65;
    }

    .ai-targets {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .ai-target-title {
      font-size: 11px;
      color: var(--muted);
      margin-right: 2px;
    }

    .ai-target {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 1px 8px;
      font-size: 11px;
      line-height: 1.3;
      white-space: nowrap;
      color: #3e3e44;
      border-color: rgba(17, 17, 17, 0.14);
      background: rgba(17, 17, 17, 0.06);
    }

    .ai-target.bullish {
      color: #1a8f45;
      border-color: rgba(52, 199, 89, 0.3);
      background: rgba(52, 199, 89, 0.14);
    }

    .ai-target.bearish {
      color: #475569;
      border-color: rgba(71, 85, 105, 0.3);
      background: rgba(71, 85, 105, 0.14);
    }

    mark {
      background: rgba(255, 214, 10, 0.45);
      color: #1c1c1e;
      border-radius: 4px;
      padding: 0 2px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 42px 12px;
    }

    .compact .item {
      padding: 8px 10px;
      margin-bottom: 7px;
    }

    .compact .text {
      font-size: 13px;
      line-height: 1.52;
    }

    .compact .expand-wrap summary {
      font-size: 11px;
      padding: 1px 8px;
      margin-bottom: 6px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 999;
      background: rgba(20, 20, 20, 0.88);
      color: #fff;
      padding: 9px 12px;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      opacity: 0;
      transform: translateY(8px);
      transition: all .22s ease;
      pointer-events: none;
      font-size: 13px;
      max-width: min(460px, calc(100vw - 40px));
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .sidebar-float {
      position: fixed;
      left: 14px;
      bottom: 20px;
      z-index: 999;
      width: auto;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(17, 17, 17, 0.12);
      color: var(--brand);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      display: none;
      font-size: 12px;
      opacity: 0.62;
      transition: opacity .18s ease, transform .18s ease, border-color .18s ease;
    }

    .sidebar-float:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      border-color: rgba(10, 132, 255, 0.38);
    }

    .sidebar-float.show {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .feed-top-btn {
      position: fixed;
      right: 20px;
      bottom: 74px;
      z-index: 998;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(17, 17, 17, 0.12);
      color: #2f6fe4;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px) scale(0.96);
      transition: opacity .2s ease, transform .2s ease, border-color .2s ease, background-color .2s ease;
    }

    .feed-top-icon {
      width: 20px;
      height: 20px;
      display: block;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .feed-top-btn svg {
      transform: translateY(-0.5px);
    }

    .feed-top-btn:hover {
      background: rgba(255, 255, 255, 0.98);
      border-color: rgba(47, 111, 228, 0.35);
      color: #245ed0;
      transform: translateY(-1px) scale(1);
    }

    .feed-top-btn:active {
      transform: translateY(0) scale(0.97);
    }

    .feed-top-btn.show {
      opacity: 0.96;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    @media (max-width: 1024px) {
      body { padding: 12px; }
      .app { grid-template-columns: 1fr; }
      .left { position: static; height: auto; }
      .right { min-height: 48vh; }
      .sidebar-float { left: 10px; bottom: 14px; }
      .feed-top-btn { right: 10px; bottom: 60px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="panel left">
      <div class="left-head">
        <h1 class="title">多源财经快讯自动盯盘台</h1>
        <button id="btn-sidebar" class="btn-ghost" type="button">折叠面板</button>
      </div>
      <div class="desc">自动聚合财联社、东方财富、新浪财经、华尔街见闻、同花顺，不需要手动复制。</div>

      <div class="stats">
        <div class="stat">累计缓存<b id="stat-total">0</b></div>
        <div class="stat">当前显示<b id="stat-visible">0</b></div>
      </div>

      <div class="grid2">
        <button id="btn-toggle" class="active">自动刷新: 开</button>

        <label for="interval">刷新间隔（秒）</label>
        <input id="interval" type="number" min="3" max="120" step="1" value="8" />

      <div class="field">
        <label for="limit">每次抓取条数</label>
        <input id="limit" type="number" min="20" max="500" step="10" value="120" />

      <div class="field">
        <label for="keyword">关键词过滤（英文逗号分隔）</label>
        <input id="keyword" type="text" placeholder="如：A股,AI,宁德时代" />
      </div>

      <div class="field">
        <label for="sourceFilter">来源筛选</label>
        <select id="sourceFilter">
          <option value="all">全部来源</option>
          <option value="cls">财联社</option>
          <option value="eastmoney">东方财富</option>
          <option value="sina">新浪财经</option>
          <option value="wscn">华尔街见闻</option>
          <option value="ths">同花顺</option>
        </select>
      </div>

      <div class="status" id="statusBox">
        <div><span class="dot" id="dot"></span><span id="statusText">等待首次同步</span></div>
        <div id="lastSync">上次更新：--</div>
        <div id="apiInfo">接口：/api/telegraph（多源聚合）</div>
      </div>

      <div class="tips">
        使用方式：
        1. 先运行本地代理服务。
        2. 打开此页面后会自动拉取并持续刷新。
        3. 如果出现拦截，等几秒重试，或把间隔调大（如 12~20 秒）。
      </div>
    </aside>

    <main class="panel right" id="feedWrap">
      <div class="head">
        <h2>实时电报流</h2>
        <span class="badge" id="updated">未更新</span>
      </div>
      <div class="feed-section-switch">
        <button id="btn-section-headline" class="section-pill" type="button">头条</button>
        <button id="btn-section-realtime" class="section-pill active" type="button">实时流</button>
      </div>
      <div class="feed" id="feed"></div>
    </main>
  </div>

  <button id="btn-sidebar-float" class="sidebar-float" type="button">展开</button>
  <button id="btn-feed-top" class="feed-top-btn" type="button" aria-label="回到顶端" title="回到顶端">
    <svg class="feed-top-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 20V6"></path>
      <path d="M6 12l6-6 6 6"></path>
    </svg>
  </button>
  <div class="toast" id="toast"></div>

  <script>
    const STORE_KEY = 'cls_auto_telegraph_feed_v3';
    const AI_STORE_KEY = 'cls_auto_telegraph_ai_v1';
    const MAX_ITEMS = 1000;
    const MAX_AI_ITEMS = 600;
    const SOURCE_NAME_MAP = {
      cls: '财联社',
      eastmoney: '东方财富',
      sina: '新浪财经',
      wscn: '华尔街见闻',
      ths: '同花顺',
    };

    const state = {
      list: [],
      seen: new Set(),
      expanded: new Set(),
      analysis: Object.create(null),
      analyzing: new Set(),
      keyword: '',
      sourceFilter: 'all',
      aggregateMode: true,
      topSection: 'realtime',
      sidebarCollapsed: false,
      compact: false,
      auto: true,
      intervalSec: 8,
      limit: 120,
      timer: null,
      enterTimer: null,
      loading: false,
      lastError: '',
    };

    const el = {
      app: document.getElementById('app'),
      feed: document.getElementById('feed'),
      feedWrap: document.getElementById('feedWrap'),
      statTotal: document.getElementById('stat-total'),
      statVisible: document.getElementById('stat-visible'),
      updated: document.getElementById('updated'),
      toast: document.getElementById('toast'),
      btnToggle: document.getElementById('btn-toggle'),
      btnRefresh: document.getElementById('btn-refresh'),
      btnCompact: document.getElementById('btn-compact'),
      btnClear: document.getElementById('btn-clear'),
      btnAggregate: document.getElementById('btn-aggregate'),
      btnSectionHeadline: document.getElementById('btn-section-headline'),
      btnSectionRealtime: document.getElementById('btn-section-realtime'),
      btnSidebar: document.getElementById('btn-sidebar'),
      btnSidebarFloat: document.getElementById('btn-sidebar-float'),
      interval: document.getElementById('interval'),
      limit: document.getElementById('limit'),
      keyword: document.getElementById('keyword'),
      sourceFilter: document.getElementById('sourceFilter'),
      dot: document.getElementById('dot'),
      statusText: document.getElementById('statusText'),
      lastSync: document.getElementById('lastSync'),
      apiInfo: document.getElementById('apiInfo'),
      btnFeedTop: document.getElementById('btn-feed-top'),
    };

    function normalizeKnownSource(source) {
      const key = String(source || '').trim().toLowerCase();
      return SOURCE_NAME_MAP[key] ? key : '';
    }

    function normalizeSource(source, fallback = 'cls') {
      return normalizeKnownSource(source) || fallback;
    }

    function sourceName(source, fallbackName) {
      const key = normalizeSource(source, '');
      return String(fallbackName || '').trim() || SOURCE_NAME_MAP[key] || '未知来源';
    }

    function sourceClass(source) {
      const key = normalizeSource(source, '');
      if (['cls', 'eastmoney', 'sina', 'wscn', 'ths'].includes(key)) return `source-${key}`;
      return 'source-other';
    }

    function itemKey(item) {
      if (item && item.uid) return String(item.uid);
      const source = normalizeSource(item && item.source);
      const id = item && item.id !== undefined ? String(item.id) : '';
      if (!id) return '';
      return `${source}:${id}`;
    }

    function normalizeItem(raw) {
      if (!raw || typeof raw !== 'object') return null;
      const source = normalizeSource(raw.source);
      const id = raw.id !== undefined && raw.id !== null ? String(raw.id).trim() : '';
      const text = String(raw.text || '').trim();
      if (!id || !text) return null;
      const ctime = Number(raw.ctime);
      return {
        uid: itemKey({ uid: raw.uid, source, id }),
        source,
        sourceName: sourceName(source, raw.sourceName),
        id,
        ctime: Number.isFinite(ctime) ? ctime : 0,
        time: String(raw.time || '').trim(),
        title: String(raw.title || '').trim(),
        text,
        author: String(raw.author || '').trim(),
        level: String(raw.level || '').trim(),
        url: String(raw.url || '').trim(),
      };
    }

    function normalizeTitleForDedupe(title) {
      return String(title || '')
        .toLowerCase()
        .replace(/[^\u4e00-\u9fa5a-z0-9%]+/gi, '')
        .trim();
    }

    function dedupeListByExactTitle(items, windowSec = 30 * 60) {
      const out = [];
      const recentByTitle = new Map();

      for (const item of items) {
        const key = normalizeTitleForDedupe(item && item.title);
        const ctime = Number(item && item.ctime) || 0;

        if (!key || key.length < 8) {
          out.push(item);
          continue;
        }

        const prev = recentByTitle.get(key);
        if (!prev) {
          recentByTitle.set(key, ctime);
          out.push(item);
          continue;
        }

        const dt = Math.abs(ctime - prev);
        if (dt <= windowSec || !ctime || !prev) {
          continue;
        }

        recentByTitle.set(key, ctime);
        out.push(item);
      }

      return out;
    }

    function hasExactTitleDuplicate(item, items, windowSec = 30 * 60, maxScan = 500) {
      const key = normalizeTitleForDedupe(item && item.title);
      if (!key || key.length < 8) return false;
      const ctime = Number(item && item.ctime) || 0;

      const size = Math.min(maxScan, items.length);
      for (let i = 0; i < size; i += 1) {
        const it = items[i];
        if (!it || it.uid === item.uid) continue;
        const key2 = normalizeTitleForDedupe(it.title);
        if (key !== key2) continue;
        const c2 = Number(it.ctime) || 0;
        const dt = Math.abs(ctime - c2);
        if (dt <= windowSec || !ctime || !c2) return true;
      }
      return false;
    }

    function nowText() {
      return new Date().toLocaleString('zh-CN', { hour12: false });
    }

    function showToast(msg) {
      el.toast.textContent = msg;
      el.toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.toast.classList.remove('show'), 1600);
    }

    function setStatus(type, text) {
      el.dot.className = 'dot';
      if (type === 'ok') el.dot.classList.add('ok');
      if (type === 'err') el.dot.classList.add('err');
      if (type === 'run') el.dot.classList.add('run');
      el.statusText.textContent = text;
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function highlight(text, keyword) {
      let out = escapeHTML(text);
      if (!keyword) return out;
      const parts = keyword.split(',').map(s => s.trim()).filter(Boolean).sort((a, b) => b.length - a.length);
      for (const p of parts) {
        const safe = p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        out = out.replace(new RegExp(safe, 'gi'), m => `<mark>${m}</mark>`);
      }
      return out;
    }

    function keywordParts() {
      const keyword = state.keyword.trim();
      if (!keyword) return [];
      return keyword.split(',').map(s => s.trim()).filter(Boolean);
    }

    function matchesSourceFilter(item) {
      if (state.sourceFilter === 'all') return true;
      return normalizeSource(item && item.source, '') === state.sourceFilter;
    }

    function matchesKeywordFilter(item, parts = null) {
      const words = Array.isArray(parts) ? parts : keywordParts();
      if (!words.length) return true;
      const target = `${item && item.title ? item.title : ''} ${item && item.text ? item.text : ''}`;
      return words.some(k => target.includes(k));
    }

    function passFilter(item) {
      return matchesSourceFilter(item) && matchesKeywordFilter(item);
    }

    function passClusterFilter(cluster, parts = null) {
      const items = cluster && Array.isArray(cluster.items) ? cluster.items : [];
      if (!items.length) return false;
      const sourceMatch = state.sourceFilter === 'all'
        ? true
        : items.some(it => matchesSourceFilter(it));
      if (!sourceMatch) return false;
      const words = Array.isArray(parts) ? parts : keywordParts();
      if (!words.length) return true;
      return items.some(it => matchesKeywordFilter(it, words));
    }

    function normalizeForCluster(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/https?:\/\/\S+/g, ' ')
        .replace(/^【[^】]{2,30}】\s*/g, '')
        .replace(/^(财联社|新浪财经|华尔街见闻|同花顺|东方财富)(\d{1,2}月\d{1,2}日)?电[，,:：\s]*/g, '')
        .replace(/^[\u4e00-\u9fa5a-z0-9%]{0,16}电[，,:：\s]*/g, '')
        .replace(/[^\u4e00-\u9fa5a-z0-9%]+/g, '')
        .trim();
    }

    function comparableHeadline(item) {
      const titleNorm = normalizeForCluster(item && item.title);
      if (titleNorm.length >= 10) return titleNorm;
      const textNorm = normalizeForCluster(item && item.text);
      if (textNorm.length >= 24) return textNorm.slice(0, 32);
      return textNorm;
    }

    function clusterSignature(item) {
      const head = comparableHeadline(item);
      if (head.length >= 10) return `h:${head.slice(0, 72)}`;
      const body = normalizeForCluster(item && item.text);
      if (body.length >= 18) return `x:${body.slice(0, 44)}`;
      return `u:${item && item.uid ? item.uid : ''}`;
    }

    function isSameEvent(lhs, rhs, lhsSignature, rhsSignature) {
      const lc = Number(lhs && lhs.ctime) || 0;
      const rc = Number(rhs && rhs.ctime) || 0;
      if (lc > 0 && rc > 0 && Math.abs(lc - rc) > 2 * 60 * 60) return false;

      if (lhsSignature === rhsSignature && !String(lhsSignature || '').startsWith('u:')) {
        return true;
      }

      const lh = comparableHeadline(lhs);
      const rh = comparableHeadline(rhs);
      if (lh.length >= 10 && rh.length >= 10 && lh === rh) return true;

      const lx = normalizeForCluster(lhs && lhs.text);
      const rx = normalizeForCluster(rhs && rhs.text);
      if (lx.length >= 24 && rx.length >= 24 && lx.slice(0, 32) === rx.slice(0, 32)) return true;

      if (lh.length >= 12 && rh.length >= 12) {
        const lp = lh.slice(0, 22);
        const rp = rh.slice(0, 22);
        if (lp.length >= 12 && rp.length >= 12 && (lp === rp || lh.startsWith(rp) || rh.startsWith(lp))) {
          return true;
        }
      }

      if (lh.length >= 12 && rx.length >= 20 && rx.startsWith(lh.slice(0, 20))) return true;
      if (rh.length >= 12 && lx.length >= 20 && lx.startsWith(rh.slice(0, 20))) return true;

      return false;
    }

    function levelClass(level) {
      const lv = String(level || '').trim().toUpperCase();
      if (lv.startsWith('A')) return 'a';
      if (lv.startsWith('B')) return 'b';
      if (lv.startsWith('C')) return 'c';
      return 'n';
    }

    function levelText(level) {
      const lv = String(level || '').trim().toUpperCase();
      return lv || '-';
    }

    function isHeadlineLevel(level) {
      const lv = String(level || '').trim().toUpperCase();
      return lv.startsWith('A') || lv.startsWith('B');
    }

    function isHeadlineItem(item) {
      return isHeadlineLevel(item && item.level);
    }

    function isHeadlineCluster(cluster) {
      return Boolean(cluster && cluster.primary && isHeadlineItem(cluster.primary));
    }

    function levelRank(level) {
      const lv = String(level || '').trim().toUpperCase();
      if (lv.startsWith('A')) return 3;
      if (lv.startsWith('B')) return 2;
      return 1;
    }

    function itemPrioritySort(lhs, rhs) {
      const l = levelRank(lhs && lhs.level);
      const r = levelRank(rhs && rhs.level);
      if (l !== r) return l > r;
      const lc = Number(lhs && lhs.ctime) || 0;
      const rc = Number(rhs && rhs.ctime) || 0;
      if (lc !== rc) return lc > rc;
      return String(lhs && lhs.uid ? lhs.uid : '') > String(rhs && rhs.uid ? rhs.uid : '');
    }

    function buildClusters(items) {
      if (!Array.isArray(items) || !items.length) return [];

      const buckets = [];
      const bucketSignatures = [];

      for (const item of items) {
        const sign = clusterSignature(item);
        let matchedIndex = -1;

        for (let idx = 0; idx < buckets.length; idx += 1) {
          const representative = buckets[idx] && buckets[idx][0];
          if (!representative) continue;
          if (isSameEvent(item, representative, sign, bucketSignatures[idx])) {
            matchedIndex = idx;
            break;
          }
        }

        if (matchedIndex >= 0) {
          buckets[matchedIndex].push(item);
        } else {
          buckets.push([item]);
          bucketSignatures.push(sign);
        }
      }

      const clusters = buckets.map((group) => {
        const sorted = group.slice().sort(itemPrioritySort);
        return {
          id: sorted[0] ? sorted[0].uid : '',
          primary: sorted[0] || null,
          items: sorted,
        };
      }).filter(c => c.primary);

      clusters.sort((a, b) => {
        const ac = Number(a.primary && a.primary.ctime) || 0;
        const bc = Number(b.primary && b.primary.ctime) || 0;
        if (ac !== bc) return bc - ac;
        return String(b.primary.uid || '').localeCompare(String(a.primary.uid || ''));
      });

      return clusters;
    }

    function save() {
      const payload = {
        v: 3,
        list: state.list.slice(0, MAX_ITEMS),
        expanded: Array.from(state.expanded).slice(0, MAX_ITEMS),
        sourceFilter: state.sourceFilter,
        aggregateMode: Boolean(state.aggregateMode),
        topSection: state.topSection,
        sidebarCollapsed: Boolean(state.sidebarCollapsed),
      };
      try {
        localStorage.setItem(STORE_KEY, JSON.stringify(payload));
      } catch (_) {}
      saveAiStore();
    }

    function saveAiStore() {
      try {
        const entries = [];
        for (const item of state.list) {
          const uid = String(item && item.uid ? item.uid : '').trim();
          if (!uid) continue;
          const analysis = state.analysis[uid];
          if (!analysis || typeof analysis !== 'object') continue;
          entries.push([uid, analysis]);
          if (entries.length >= MAX_AI_ITEMS) break;
        }
        localStorage.setItem(AI_STORE_KEY, JSON.stringify({ v: 1, entries }));
      } catch (_) {}
    }

    function cleanupExpandedState() {
      if (!state.expanded.size || !state.list.length) return false;
      const valid = new Set(state.list.map(it => it.uid));
      let changed = false;
      for (const uid of Array.from(state.expanded)) {
        if (!valid.has(uid)) {
          state.expanded.delete(uid);
          changed = true;
        }
      }
      return changed;
    }

    function cleanupAnalysisState() {
      const valid = new Set(state.list.map(it => it.uid));
      let changed = false;
      for (const uid of Object.keys(state.analysis)) {
        if (!valid.has(uid)) {
          delete state.analysis[uid];
          changed = true;
        }
      }
      return changed;
    }

    function load() {
      try {
        const rawCurrent = localStorage.getItem(STORE_KEY);
        const rawLegacyV2 = localStorage.getItem('cls_auto_telegraph_feed_v2');
        const rawV1 = localStorage.getItem('cls_auto_telegraph_feed_v1');

        let parsed = null;
        if (rawCurrent) {
          const data = JSON.parse(rawCurrent);
          if (Array.isArray(data)) {
            parsed = { list: data };
          } else if (data && typeof data === 'object' && Array.isArray(data.list)) {
            parsed = data;
          }
        } else if (rawLegacyV2) {
          const data = JSON.parse(rawLegacyV2);
          if (Array.isArray(data)) {
            parsed = { list: data };
          } else if (data && typeof data === 'object' && Array.isArray(data.list)) {
            parsed = data;
          }
        } else if (rawV1) {
          const oldList = JSON.parse(rawV1);
          if (Array.isArray(oldList)) parsed = { list: oldList };
        }

        if (!parsed || !Array.isArray(parsed.list)) return;

        const normalized = [];
        const seen = new Set();

        for (const row of parsed.list) {
          const item = normalizeItem(row);
          if (!item || !item.uid) continue;
          if (seen.has(item.uid)) continue;
          seen.add(item.uid);
          normalized.push(item);
        }

        normalized.sort((a, b) => b.ctime - a.ctime || String(b.uid).localeCompare(String(a.uid)));
        if (normalized.length > MAX_ITEMS) normalized.length = MAX_ITEMS;

        state.list = dedupeListByExactTitle(normalized);
        state.seen = seen;

        if (Array.isArray(parsed.expanded)) {
          state.expanded = new Set(parsed.expanded.map(x => String(x || '').trim()).filter(Boolean));
        }
        cleanupExpandedState();

        if (parsed.analysis && typeof parsed.analysis === 'object') {
          state.analysis = parsed.analysis;
        }

        const rawAi = localStorage.getItem(AI_STORE_KEY);
        if (rawAi) {
          const aiData = JSON.parse(rawAi);
          const merged = Object.assign(Object.create(null), state.analysis);
          if (aiData && typeof aiData === 'object' && Array.isArray(aiData.entries)) {
            for (const pair of aiData.entries) {
              if (!Array.isArray(pair) || pair.length < 2) continue;
              const uid = String(pair[0] || '').trim();
              const val = pair[1];
              if (!uid || !val || typeof val !== 'object') continue;
              merged[uid] = val;
            }
          } else if (aiData && typeof aiData === 'object') {
            for (const uid of Object.keys(aiData)) {
              const val = aiData[uid];
              if (!val || typeof val !== 'object') continue;
              merged[uid] = val;
            }
          }
          state.analysis = merged;
        }
        cleanupAnalysisState();

        if (parsed.sourceFilter === 'all' || SOURCE_NAME_MAP[parsed.sourceFilter]) {
          state.sourceFilter = parsed.sourceFilter;
        }
        if (typeof parsed.aggregateMode === 'boolean') {
          state.aggregateMode = parsed.aggregateMode;
        }
        if (parsed.topSection === 'headline' || parsed.topSection === 'realtime') {
          state.topSection = parsed.topSection;
        }
        if (typeof parsed.sidebarCollapsed === 'boolean') {
          state.sidebarCollapsed = parsed.sidebarCollapsed;
        }
      } catch (_) {}
    }

    function merge(newItems) {
      let added = 0;
      const newUids = [];
      for (let i = newItems.length - 1; i >= 0; i -= 1) {
        const item = normalizeItem(newItems[i]);
        if (!item || !item.uid) continue;
        if (state.seen.has(item.uid)) continue;
        if (hasExactTitleDuplicate(item, state.list)) {
          state.seen.add(item.uid);
          continue;
        }
        state.seen.add(item.uid);
        state.list.unshift(item);
        newUids.push(item.uid);
        added += 1;
      }
      state.list = dedupeListByExactTitle(state.list);
      if (state.list.length > MAX_ITEMS) state.list.length = MAX_ITEMS;
      const expandedChanged = cleanupExpandedState();
      const analysisChanged = cleanupAnalysisState();
      if (added > 0 || expandedChanged || analysisChanged) save();
      return { added, newUids };
    }

    function sentimentLabel(sentiment) {
      const s = String(sentiment || '').toLowerCase();
      if (s === 'bullish') return '偏利好';
      if (s === 'bearish') return '偏利空';
      return '中性';
    }

    function renderAiPanel(analysis) {
      if (!analysis || typeof analysis !== 'object') return '';
      const sentiment = String(analysis.sentiment || 'neutral').toLowerCase();
      const sentimentClass = sentiment === 'bullish' ? 'bullish' : (sentiment === 'bearish' ? 'bearish' : 'neutral');
      const positive = Array.isArray(analysis.positive_factors) ? analysis.positive_factors : [];
      const negative = Array.isArray(analysis.negative_factors) ? analysis.negative_factors : [];
      const bullishTargets = Array.isArray(analysis.bullish_targets) ? analysis.bullish_targets : [];
      const bearishTargets = Array.isArray(analysis.bearish_targets) ? analysis.bearish_targets : [];
      const impactTargets = Array.isArray(analysis.impact_targets) ? analysis.impact_targets : [];

      const posHtml = positive.length
        ? `<ul class="ai-bullets">${positive.map(x => `<li>利好：${escapeHTML(String(x))}</li>`).join('')}</ul>`
        : '';
      const negHtml = negative.length
        ? `<ul class="ai-bullets">${negative.map(x => `<li>利空：${escapeHTML(String(x))}</li>`).join('')}</ul>`
        : '';
      const bullTargetHtml = bullishTargets.length
        ? `<div class="ai-targets"><span class="ai-target-title">偏利好方向</span>${bullishTargets.map(x => `<span class="ai-target bullish">${escapeHTML(String(x))}</span>`).join('')}</div>`
        : '';
      const bearTargetHtml = bearishTargets.length
        ? `<div class="ai-targets"><span class="ai-target-title">偏利空方向</span>${bearishTargets.map(x => `<span class="ai-target bearish">${escapeHTML(String(x))}</span>`).join('')}</div>`
        : '';
      const impactHtml = (!bullishTargets.length && !bearishTargets.length && impactTargets.length)
        ? `<div class="ai-targets"><span class="ai-target-title">影响标的</span>${impactTargets.map(x => `<span class="ai-target">${escapeHTML(String(x))}</span>`).join('')}</div>`
        : '';

      return `
        <div class="ai-panel">
          <div class="ai-head">
            <span class="ai-chip ${sentimentClass}">${escapeHTML(sentimentLabel(sentiment))}</span>
            <span class="ai-score">分值 ${escapeHTML(String(analysis.score || 0))} / 置信度 ${escapeHTML(String(analysis.confidence || 0))}</span>
          </div>
          ${analysis.summary ? `<div class="ai-summary">${escapeHTML(String(analysis.summary))}</div>` : ''}
          ${bullTargetHtml}
          ${bearTargetHtml}
          ${impactHtml}
          ${posHtml}
          ${negHtml}
        </div>
      `;
    }

    function findCardByUid(uid) {
      const cards = el.feed.querySelectorAll('article.item[data-uid]');
      for (const card of cards) {
        if (String(card.dataset.uid || '') === String(uid || '')) return card;
      }
      return null;
    }

    function updateCardAnalysisUI(uid) {
      const card = findCardByUid(uid);
      if (!card) return;

      const btn = card.querySelector('button[data-action="ai-analyze"]');
      if (btn) {
        const loading = state.analyzing.has(uid);
        const done = Boolean(state.analysis[uid]);
        btn.disabled = loading;
        btn.classList.toggle('loading', loading);
        btn.classList.toggle('done', !loading && done);
        btn.textContent = loading ? '分析中...' : (done ? '重新分析' : 'AI分析');
      }

      const holder = card.querySelector('[data-ai-result]');
      if (holder) {
        holder.innerHTML = renderAiPanel(state.analysis[uid]);
      }
    }

    async function requestAiAnalysis(uid) {
      if (!uid || state.analyzing.has(uid)) return;
      const item = state.list.find(it => it.uid === uid);
      if (!item) return;

      state.analyzing.add(uid);
      updateCardAnalysisUI(uid);

      try {
        const resp = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            uid: item.uid,
            source: item.source,
            time: item.time,
            title: item.title,
            text: item.text,
          }),
        });
        const data = await resp.json();
        if (!resp.ok || !data.ok) {
          throw new Error((data && data.error) || `http_${resp.status}`);
        }
        state.analysis[uid] = data.analysis || {};
        save();
        updateCardAnalysisUI(uid);
        showToast(data.cached ? 'AI分析完成（缓存）' : 'AI分析完成');
      } catch (err) {
        const msg = err && err.message ? err.message : 'unknown_error';
        showToast(`AI分析失败：${msg}`);
      } finally {
        state.analyzing.delete(uid);
        updateCardAnalysisUI(uid);
      }
    }

    function uniqueSourceNames(items) {
      const seen = new Set();
      const out = [];
      for (const it of (Array.isArray(items) ? items : [])) {
        const name = sourceName(it && it.source, it && it.sourceName);
        if (!name || seen.has(name)) continue;
        seen.add(name);
        out.push(name);
      }
      return out;
    }

    function buildClusterExtraHtml(cluster) {
      const items = cluster && Array.isArray(cluster.items) ? cluster.items : [];
      if (items.length <= 1) return '';

      const mergedCount = items.length;
      const names = uniqueSourceNames(items);
      const variants = items.slice(1);
      const variantsHtml = variants.map((it) => {
        const raw = String((it && it.title) || (it && it.text) || '').replace(/\s+/g, ' ').trim();
        const preview = raw.length > 110 ? `${raw.slice(0, 110)}...` : raw;
        return `
          <div class="cluster-row">
            <div class="cluster-row-head">
              <span class="cluster-row-time">${escapeHTML(String(it && it.time ? it.time : '--:--:--'))}</span>
              <span class="cluster-row-source">${escapeHTML(sourceName(it && it.source, it && it.sourceName))}</span>
            </div>
            <div class="cluster-row-text">${highlight(preview, state.keyword)}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="cluster-meta">聚合 ${mergedCount} 条${names.length ? ` · ${escapeHTML(names.join(' / '))}` : ''}</div>
        <details class="cluster-wrap"><summary>查看同事件 ${mergedCount - 1} 条</summary><div class="cluster-list">${variantsHtml}</div></details>
      `;
    }

    function clusterHasAnimatedUID(cluster, animateSet) {
      if (!cluster || !cluster.items || !animateSet || !animateSet.size) return false;
      for (const it of cluster.items) {
        if (animateSet.has(it.uid)) return true;
      }
      return false;
    }

    function buildItemNode(item, animateEnter = false, cluster = null) {
      const lvClass = levelClass(item.level);
      const hasTitle = Boolean(String(item.title || '').trim());
      const hasBody = Boolean(String(item.text || '').trim());
      const bodyHtml = hasBody ? `<div class="text">${highlight(item.text || '', state.keyword)}</div>` : '';
      const expandedAttr = state.expanded.has(item.uid) ? ' open' : '';
      const clusterExtraHtml = buildClusterExtraHtml(cluster);
      const contentHtml = hasTitle
        ? (hasBody
          ? `<details class="expand-wrap" data-uid="${escapeHTML(item.uid)}"${expandedAttr}><summary>展开全文</summary>${bodyHtml}</details>`
          : '')
        : bodyHtml;

      const article = document.createElement('article');
      article.className = `item level-${lvClass}${animateEnter ? ' item-enter' : ''}`;
      article.dataset.uid = item.uid;
      const loading = state.analyzing.has(item.uid);
      const done = Boolean(state.analysis[item.uid]);
      const btnClass = loading ? 'ai-btn loading' : (done ? 'ai-btn done' : 'ai-btn');
      const btnText = loading ? '分析中...' : (done ? '重新分析' : 'AI分析');
      article.innerHTML = `
        <div class="item-head">
          <span class="item-time">${escapeHTML(item.time || '--:--:--')}</span>
          <span class="item-tags">
            <span class="source-badge ${sourceClass(item.source)}">${escapeHTML(sourceName(item.source, item.sourceName))}</span>
          </span>
        </div>
        ${item.title ? `<div class="title-row">${highlight(item.title, state.keyword)}</div>` : ''}
        ${contentHtml}
        ${clusterExtraHtml}
        <div class="meta-row">
          <div class="meta">
            ${item.author ? `<span>来源：${escapeHTML(item.author)}</span>` : ''}
            ${item.id ? `<span>ID：${escapeHTML(String(item.id))}</span>` : ''}
            ${item.url ? `<span><a href="${escapeHTML(item.url)}" target="_blank" rel="noopener noreferrer">原文</a></span>` : ''}
          </div>
          <button class="${btnClass}" data-action="ai-analyze" data-uid="${escapeHTML(item.uid)}" ${loading ? 'disabled' : ''}>${btnText}</button>
        </div>
        <div data-ai-result>${renderAiPanel(state.analysis[item.uid])}</div>
      `;
      return article;
    }

    function scheduleClearEnterClass() {
      if (state.enterTimer) clearTimeout(state.enterTimer);
      state.enterTimer = setTimeout(() => {
        const nodes = el.feed.querySelectorAll('article.item-enter');
        for (const node of nodes) node.classList.remove('item-enter');
      }, 500);
    }

    function isFeedNearTop() {
      return el.feed.scrollTop <= 8;
    }

    function getActiveScrollTop() {
      return Math.max(el.feed.scrollTop || 0, window.scrollY || 0);
    }

    function updateFeedTopButton() {
      const shouldShow = getActiveScrollTop() > 120;
      el.btnFeedTop.classList.toggle('show', shouldShow);
    }

    function setFeedScrollTop(top) {
      const maxTop = Math.max(0, el.feed.scrollHeight - el.feed.clientHeight);
      const target = Math.max(0, Math.min(maxTop, Number(top) || 0));
      const oldInlineBehavior = el.feed.style.scrollBehavior;
      el.feed.style.scrollBehavior = 'auto';
      el.feed.scrollTop = target;
      if (oldInlineBehavior) el.feed.style.scrollBehavior = oldInlineBehavior;
      else el.feed.style.removeProperty('scroll-behavior');
    }

    function captureFeedAnchor() {
      const feedTop = el.feed.getBoundingClientRect().top;
      const cards = el.feed.querySelectorAll('article.item[data-uid]');
      for (const card of cards) {
        const rect = card.getBoundingClientRect();
        if (rect.bottom > feedTop + 1) {
          return {
            uid: String(card.dataset.uid || ''),
            offsetTop: rect.top - feedTop,
          };
        }
      }
      return null;
    }

    function restoreFeedAnchor(anchor) {
      if (!anchor || !anchor.uid) return;
      const target = findCardByUid(anchor.uid);
      if (!target) return;
      const feedTop = el.feed.getBoundingClientRect().top;
      const rect = target.getBoundingClientRect();
      const delta = rect.top - feedTop - Number(anchor.offsetTop || 0);
      if (Math.abs(delta) > 0.5) {
        setFeedScrollTop(el.feed.scrollTop + delta);
      }
    }

    function render(animateUids = null, options = {}) {
      const preserveViewport = Boolean(options && options.preserveViewport);
      const anchor = preserveViewport ? captureFeedAnchor() : null;
      const words = keywordParts();
      const isHeadline = state.topSection === 'headline';
      const allList = state.list.filter(it => passFilter(it));
      const list = isHeadline ? allList.filter(isHeadlineItem) : allList;
      const allClusters = state.aggregateMode
        ? buildClusters(state.list).filter(c => passClusterFilter(c, words))
        : [];
      const clusters = isHeadline ? allClusters.filter(isHeadlineCluster) : allClusters;
      el.statTotal.textContent = String(state.list.length);
      el.statVisible.textContent = state.aggregateMode ? `${clusters.length}组` : String(list.length);

      if ((!state.aggregateMode && !list.length) || (state.aggregateMode && !clusters.length)) {
        const emptyText = isHeadline
          ? '暂无 A/B 级头条，等待新电报。'
          : '暂无数据，点击“立即刷新”或等待自动同步。';
        el.feed.innerHTML = `<div class="empty">${emptyText}</div>`;
        updateFeedTopButton();
        return;
      }

      const animateSet = animateUids ? new Set(animateUids) : new Set();
      const frag = document.createDocumentFragment();
      if (state.aggregateMode) {
        for (const cluster of clusters) {
          frag.appendChild(buildItemNode(
            cluster.primary,
            clusterHasAnimatedUID(cluster, animateSet),
            cluster
          ));
        }
      } else {
        for (const item of list) {
          frag.appendChild(buildItemNode(item, animateSet.has(item.uid)));
        }
      }
      el.feed.replaceChildren(frag);
      if (anchor) restoreFeedAnchor(anchor);
      if (animateSet.size > 0) scheduleClearEnterClass();
      updateFeedTopButton();
    }

    function prependNewItems(newUids, options = {}) {
      if (state.aggregateMode || state.topSection === 'headline') return false;
      const uidSet = new Set(Array.isArray(newUids) ? newUids : []);
      if (!uidSet.size) return false;
      const preserveViewport = Boolean(options && options.preserveViewport);
      const anchor = preserveViewport ? captureFeedAnchor() : null;

      const list = state.list.filter(it => uidSet.has(it.uid) && passFilter(it));
      if (!list.length) return false;

      const empty = el.feed.querySelector('.empty');
      if (empty) empty.remove();

      const frag = document.createDocumentFragment();
      for (const item of list) {
        frag.appendChild(buildItemNode(item, true));
      }
      el.feed.prepend(frag);

      const visibleCount = state.list.filter(it => passFilter(it)).length;
      el.statTotal.textContent = String(state.list.length);
      el.statVisible.textContent = String(visibleCount);

      const nodes = el.feed.querySelectorAll('article.item[data-uid]');
      for (let i = visibleCount; i < nodes.length; i += 1) {
        nodes[i].remove();
      }

      if (anchor) restoreFeedAnchor(anchor);
      scheduleClearEnterClass();
      updateFeedTopButton();
      return true;
    }

    function formatSourcesInfo(sources) {
      if (!Array.isArray(sources) || !sources.length) return '';
      const parts = [];
      for (const s of sources) {
        const source = normalizeSource(s && s.source, '');
        const name = sourceName(source, s && s.sourceName);
        if (s && s.ok) {
          parts.push(`${name}✓${Number(s.count) || 0}`);
        } else {
          parts.push(`${name}✗`);
        }
      }
      return parts.join(' / ');
    }

    function applySidebarState() {
      el.app.classList.toggle('sidebar-collapsed', state.sidebarCollapsed);
      el.btnSidebar.textContent = state.sidebarCollapsed ? '展开面板' : '折叠面板';
      el.btnSidebarFloat.classList.toggle('show', state.sidebarCollapsed);
    }

    function applyAggregateState() {
      el.btnAggregate.classList.toggle('active', state.aggregateMode);
      el.btnAggregate.textContent = `消息聚合: ${state.aggregateMode ? '开' : '关'}`;
    }

    function applyTopSectionState() {
      const headline = state.topSection === 'headline';
      el.btnSectionHeadline.classList.toggle('active', headline);
      el.btnSectionRealtime.classList.toggle('active', !headline);
    }

    async function syncOnce() {
      if (state.loading) return;
      state.loading = true;
      setStatus('run', '同步中...');

      try {
        const url = `/api/telegraph?limit=${encodeURIComponent(String(state.limit))}`;
        const resp = await fetch(url, { cache: 'no-store' });
        const data = await resp.json();

        if (!resp.ok || !data.ok) {
          throw new Error(data.error || `http_${resp.status}`);
        }

        const items = Array.isArray(data.items) ? data.items : [];
        const mergeResult = merge(items);
        const added = mergeResult.added;
        const sourceInfo = formatSourcesInfo(data.sources);

        el.updated.textContent = `最近更新 ${nowText()}`;
        el.lastSync.textContent = `上次更新：${nowText()}`;
        el.apiInfo.textContent = `接口：/api/telegraph（返回 ${items.length} 条${data.cached ? '，缓存' : ''}${sourceInfo ? `；${sourceInfo}` : ''}）`;

        if (added > 0) {
          showToast(`新增 ${added} 条`);
        }

        setStatus('ok', state.auto ? '自动刷新中' : '已手动更新');
        state.lastError = '';
        if (added > 0) {
          const preserveViewport = !isFeedNearTop();
          const canIncrementalInsert =
            !state.aggregateMode &&
            state.topSection === 'realtime' &&
            state.keyword.trim() === '' &&
            state.sourceFilter === 'all';
          if (!canIncrementalInsert || !prependNewItems(mergeResult.newUids, { preserveViewport })) {
            render(mergeResult.newUids, { preserveViewport });
          }
        }
      } catch (err) {
        const msg = err && err.message ? err.message : 'unknown_error';
        state.lastError = msg;
        setStatus('err', `同步失败：${msg}`);
        el.lastSync.textContent = `上次更新：${nowText()}（失败）`;
        showToast(`同步失败：${msg}`);
      } finally {
        state.loading = false;
      }
    }

    function restartTimer() {
      if (state.timer) {
        clearInterval(state.timer);
        state.timer = null;
      }
      if (!state.auto) return;
      const ms = Math.max(3, Math.min(120, state.intervalSec)) * 1000;
      state.timer = setInterval(syncOnce, ms);
    }

    function bind() {
      el.btnToggle.addEventListener('click', () => {
        state.auto = !state.auto;
        el.btnToggle.classList.toggle('active', state.auto);
        el.btnToggle.textContent = `自动刷新: ${state.auto ? '开' : '关'}`;
        restartTimer();
        setStatus('ok', state.auto ? '自动刷新中' : '自动刷新已关闭');
      });

      el.btnRefresh.addEventListener('click', syncOnce);

      el.btnCompact.addEventListener('click', () => {
        state.compact = !state.compact;
        el.feedWrap.classList.toggle('compact', state.compact);
        el.btnCompact.classList.toggle('active', state.compact);
      });

      el.btnAggregate.addEventListener('click', () => {
        state.aggregateMode = !state.aggregateMode;
        applyAggregateState();
        save();
        render();
      });

      el.btnSectionHeadline.addEventListener('click', () => {
        if (state.topSection === 'headline') return;
        state.topSection = 'headline';
        applyTopSectionState();
        save();
        render();
      });

      el.btnSectionRealtime.addEventListener('click', () => {
        if (state.topSection === 'realtime') return;
        state.topSection = 'realtime';
        applyTopSectionState();
        save();
        render();
      });

      el.btnClear.addEventListener('click', () => {
        if (!confirm('确认清空本地缓存的所有电报吗？')) return;
        state.list = [];
        state.seen.clear();
        state.expanded.clear();
        state.analysis = Object.create(null);
        state.analyzing.clear();
        try { localStorage.removeItem(AI_STORE_KEY); } catch (_) {}
        save();
        render();
        showToast('已清空缓存');
      });

      el.interval.addEventListener('change', () => {
        const n = Number(el.interval.value);
        state.intervalSec = Number.isFinite(n) ? Math.max(3, Math.min(120, Math.floor(n))) : 8;
        el.interval.value = String(state.intervalSec);
        restartTimer();
      });

      el.limit.addEventListener('change', () => {
        const n = Number(el.limit.value);
        state.limit = Number.isFinite(n) ? Math.max(20, Math.min(500, Math.floor(n))) : 120;
        el.limit.value = String(state.limit);
      });

      el.keyword.addEventListener('input', () => {
        state.keyword = el.keyword.value.trim();
        render();
      });

      el.sourceFilter.addEventListener('change', () => {
        const selected = String(el.sourceFilter.value || '').trim().toLowerCase();
        state.sourceFilter = selected === 'all' ? 'all' : normalizeSource(selected, 'all');
        save();
        render();
      });

      el.feed.addEventListener('click', (evt) => {
        const btn = evt.target && evt.target.closest ? evt.target.closest('button[data-action="ai-analyze"]') : null;
        if (!btn) return;
        const uid = String(btn.dataset.uid || '').trim();
        if (!uid) return;
        requestAiAnalysis(uid);
      });

      el.feed.addEventListener('toggle', (evt) => {
        const target = evt.target;
        if (!target || target.tagName !== 'DETAILS') return;
        if (!target.classList.contains('expand-wrap')) return;
        const uid = String(target.dataset.uid || '').trim();
        if (!uid) return;
        if (target.open) state.expanded.add(uid);
        else state.expanded.delete(uid);
        save();
      }, true);

      el.btnSidebar.addEventListener('click', () => {
        state.sidebarCollapsed = !state.sidebarCollapsed;
        applySidebarState();
        save();
      });

      el.btnSidebarFloat.addEventListener('click', () => {
        state.sidebarCollapsed = false;
        applySidebarState();
        save();
      });

      el.btnFeedTop.addEventListener('click', () => {
        el.feed.scrollTo({ top: 0, behavior: 'smooth' });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      el.feed.addEventListener('scroll', updateFeedTopButton, { passive: true });
      window.addEventListener('scroll', updateFeedTopButton, { passive: true });
    }

    function init() {
      load();
      el.sourceFilter.value = state.sourceFilter;
      applySidebarState();
      applyAggregateState();
      applyTopSectionState();
      bind();
      render();
      updateFeedTopButton();
      restartTimer();
      syncOnce();
    }

    init();
  </script>
</body>
</html>
